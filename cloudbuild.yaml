steps:
- name: 'gcr.io/cloud-builders/go'
  args: ['test', './...']
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/rss-alert', '.']
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/rss-alert']
- name: 'gcr.io/cloud-builders/gcloud'
  entrypoint: 'gcloud'
  args:
    - 'run'
    - 'deploy'
    - 'rss-alert'
    - '--region'
    - '${_REGION}'
    - '--platform'
    - 'managed'
    - '--image'
    - 'gcr.io/$PROJECT_ID/rss-alert'
    - '--allow-unauthenticated'
    - '--set-env-vars'
    - 'FEED_URL=${_FEED_URL},SMTP_HOST=${_SMTP_HOST},SMTP_USER=${_SMTP_USER},SMTP_PASS=${_SMTP_PASS},GOOGLE_CLOUD_PROJECT=$PROJECT_ID,FIREBASE_DATABASE_ID=${_FIREBASE_DATABASE_ID}'
images:
- 'gcr.io/$PROJECT_ID/rss-alert'
substitutions:
  _FEED_URL: 'https://forums.redflagdeals.com/feed/topic/2796608'
  _SMTP_HOST: 'smtp.zohocloud.ca'
  _SMTP_USER: 'smtp-user@example.com'
  _SMTP_PASS: 'smtp-pass'
  _REGION: 'us-central1'
  _FIREBASE_DATABASE_ID: '(default)'
timeout: '1200s'
